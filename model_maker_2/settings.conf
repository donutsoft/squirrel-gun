[train]
# Required paths
positives_dir = positives
bbox_file = bboxes_resolved.txt
yolo_root = yolo

# Optional negatives (images with no boxes)
negatives_dir = negatives

# Training hyperparams
model = yolo11n.pt
epochs = 50
imgsz = 320
batch = 16
val_split = 0.2
device = mps
seed = 42

[predict]
weights = runs/detect/train/weights/best.pt
source = positives
conf = 0.25
iou = 0.45
imgsz = 320
max_det = 5
classes = 0
device = mps
save = false

