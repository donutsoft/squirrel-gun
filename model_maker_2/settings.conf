[train]
# Required paths
positives_dir = ../dataset/positives
bbox_file = ../dataset/bboxes.txt
yolo_root = yolo

# Optional negatives (images with no boxes)
negatives_dir = ../dataset/negatives

# Training hyperparams
model = yolov8n.pt
epochs = 50
imgsz = 320
batch = 16
val_split = 0.2
device = mps
seed = 42

[predict]
# weights is optional. If omitted, the newest runs/detect/*/weights/best.pt is used.
# weights = runs/detect/train/weights/best.pt
source = positives
conf = 0.25
iou = 0.45
imgsz = 320
max_det = 5
classes = 0
device = mps
save = false

[extract_false_positives]
# Source can be one video file or a directory containing mp4/mov/avi/mkv/webm videos.
# weights is optional. If omitted, the newest runs/detect/*/weights/best.pt is used.
# weights = runs/detect/train/weights/best.pt
source = ../videos/false_positive_examples
output_dir = false_positives
# False-positive mining is intentionally lower than normal inference so weak
# detections are captured for review.
conf = 0.05
iou = 0.45
imgsz = 320
max_det = 5
classes = 0
device = mps
frame_stride = 1
min_gap_frames = 0
save_annotated = true
jpeg_quality = 95
limit =
verbose = false
